forceRestart: true
services:
  - name: example1
    image:
      registry: "eu.gcr.io/igenius-registry"
      repository: example1
      tag: "latest"
      pullPolicy: IfNotPresent
    imagePullSecrets:
      - name: vault-image-pull-secrets
    # expose:
    #   - name: external1
    #     type: LoadBalancer
    #     ports:
    #       - port: 8080
    #         targetPort: 80
    #         name: http-lb
    #         protocol: TCP
    ingress:
      enabled: true
      host: "example1"
      ingressClass: kong
      targetPort: 80
      exposeName: ""
      annotations:
        konghq.com/strip-path: "true"
        konghq.com/protocols: https
        konghq.com/https-redirect-status-code: "308"
        cert-manager.io/cluster-issuer: "letsencrypt"
      tls:
        enabled: true
        secretName: "tls-secret-example1"
