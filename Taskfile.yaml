version: '3'

includes:
  tls:
    taskfile: scripts/tls/Taskfile.yaml
    dir: scripts/tls

tasks:

  default:
    silent: true
    cmd: task --list

  cluster:nginx-ingress:
    desc: Deploy the nginx Ingress controller to the cluster (one-time setup).
    summary: |
      Applies the official nginx Ingress controller manifest to the cluster
      using the current kubectl context.

      Only needs to be run once per cluster. Re-running it is safe — kubectl
      apply is idempotent.

      After running, wait for the controller pod to become ready:
        kubectl get pods -n ingress-nginx -w

      Overridable variables:
        context — kubectl context to use (default: current context)

      Examples:
        task cluster:nginx-ingress
        task cluster:nginx-ingress context=my-aks-cluster
    vars:
      context: '{{.context | default "docker-desktop"}}'
    prompt: "Deploy nginx Ingress controller to context '{{.context}}'?"
    cmd: kubectl apply --context {{.context}} -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml

  cluster:nginx-ingress:remove:
    desc: Remove the nginx Ingress controller from the cluster.
    summary: |
      Deletes the official nginx Ingress controller manifest from the cluster
      using the current kubectl context.

      Overridable variables:
        context — kubectl context to use (default: current context)

      Examples:
        task cluster:nginx-ingress:remove
        task cluster:nginx-ingress:remove context=my-aks-cluster
    vars:
      context: '{{.context | default "docker-desktop"}}'
    prompt: "Remove nginx Ingress controller from context '{{.context}}'?"
    cmd: kubectl delete --context {{.context}} -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml

  domyn-cli:install:
    desc: Install the domyn CLI via pipx.
    summary: |
      Installs the domyn CLI from the local ./domyn-cli/ directory as an editable
      pipx package, making the `domyn` binary available on your $PATH.

      Run this once after cloning the repository. Re-running it is safe — pipx
      will reinstall if the package is already present.

      After installation verify it works with:
        domyn --version
    cmd: pipx install -e ./domyn-cli/

  domyn-cli:update:
    desc: Reinstall the domyn CLI to pick up local code changes.
    summary: |
      Reinstalls the domyn CLI via pipx, refreshing the installed binary with
      any changes made to the source code under ./domyn-cli/.

      Use this after pulling new commits that include CLI changes, or after
      modifying the CLI source locally.

        task domyn-cli:update
    cmd: pipx reinstall domyn

  domyn-cli:remove:
    desc: Uninstall the domyn CLI from the system.
    summary: |
      Removes the domyn CLI and its isolated pipx environment from the system.
      The `domyn` binary will no longer be available on your $PATH.

      To reinstall afterwards:
        task domyn-cli:install
    prompt: "This will remove the domyn CLI from your system. Are you sure?"
    cmd: pipx uninstall domyn
