{{- range .Values.services }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "service.fullname" $ }}-test-{{ .name }}"
  labels:
    {{- include "service.labels" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "service.fullname" $ }}-{{ .name }}:{{ .port }}']
  restartPolicy: Never
{{- end }}
