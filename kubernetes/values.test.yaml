services:
  # Service example 1
  - name: example1
    image:
      registry: "reg1"
      repository: test1
      tag: "latest"
      pullPolicy: Always
    expose:
      - name: external1
        type: LoadBalancer
        ports:
          - port: 8080
            targetPort: 80
            name: http-lb
            protocol: TCP
    ingress:
      enabled: true
      host: "test1.local"
      ingressClass: nginx
      targetPort: 80
      exposeName: ""
      tls:
        enabled: true
        secretName: "tls-secret"
  # Service example 2
  - name: example2
    image:
      registry: "reg2"
      repository: test2
      tag: "latest"
      pullPolicy: Always
    env:
      - name: EXPOSE_SERVEO
        value: "false"
    expose:
      - name: external1
        type: LoadBalancer
        ports:
          - port: 8888
            targetPort: 80
            name: http-lb
            protocol: TCP
    ingress:
      enabled: true
      host: "test2.local"
      ingressClass: nginx
      portName: http
      exposeName: ""
      targetPort: 8080
      tls:
        enabled: true
        secretName: "tls-secret"
