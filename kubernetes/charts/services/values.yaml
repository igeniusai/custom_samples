replicaCount: 1

imagePullSecrets: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# List of deployments. Each entry produces one Deployment and one or more Services.
#
#   name          – resource name suffix and container name
#   image         – container image settings
#     registry    – optional registry hostname (e.g. ghcr.io/myorg); omit for local images
#     repository  – image name
#     tag         – image tag; defaults to appVersion
#     pullPolicy  – imagePullPolicy
#   env           – list of environment variables injected into the container
#     name        – variable name
#     value       – literal string value (use valueFrom for secrets/configmaps)
#     valueFrom   – reference to a Secret or ConfigMap key (standard Kubernetes valueFrom)
#   expose        – list of Kubernetes Service objects for this Deployment;
#                   each entry produces one Service named <release>-<app>-<expose.name>
#     name        – Service name suffix
#     type        – ClusterIP | NodePort | LoadBalancer; defaults to LoadBalancer
#     ports       – list of ports for this Service
#       port      – external port exposed by the Service
#       targetPort – container port number the traffic is forwarded to
#       name      – port name; referenced by both the Service and the Deployment
#       protocol  – TCP | UDP | SCTP; defaults to TCP
#   ingress       – optional Ingress configuration
#     enabled     – creates an Ingress resource for this Deployment
#     host        – hostname for the Ingress rule
#     ingressClass – Ingress class to use; defaults to nginx
#     targetPort  – container port the ingress ClusterIP Service forwards to; defaults to 80
#     exposeName  – which expose entry to use as the Ingress backend; defaults to first entry
#     tls         – optional TLS block (secret must exist before deploying)
#       enabled   – adds a TLS spec to the Ingress
#       secretName – name of the pre-existing kubernetes.io/tls Secret
#                    defaults to <release>-<name>-tls
#
services:
  - name: example
    image:
      registry: ""
      repository: service
      tag: "latest"
      pullPolicy: IfNotPresent
    env: []
    # env:
    #   - name: MY_VAR
    #     value: "my-value"
    #   - name: MY_SECRET
    #     valueFrom:
    #       secretKeyRef:
    #         name: my-secret
    #         key: secret-key
    expose:
      - name: external
        type: LoadBalancer
        ports:
          - port: 8080
            targetPort: 80
            name: http
            protocol: TCP
    ingress:
      enabled: false
      host: ""
      ingressClass: nginx
      targetPort: 80
      exposeName: ""
      tls:
        enabled: false
        secretName: ""
