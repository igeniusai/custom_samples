{{- range .Values.services }}
{{- if and .ingress .ingress.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "service.exposeName" (dict "root" $ "component" .name "expose" "ingress") }}
  labels:
    {{- include "service.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
spec:
  type: ClusterIP
  selector:
    {{- include "service.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .ingress.targetPort | default 80 }}
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "service.componentName" (dict "root" $ "component" .name) }}
  labels:
    {{- include "service.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
  annotations:
    kubernetes.io/ingress.class: {{ .ingress.ingressClass | default "nginx" }}
    {{- with .ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .ingress.ingressClass | default "nginx" }}
  {{- if and .ingress.tls .ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .ingress.host }}
      secretName: {{ .ingress.tls.secretName | default (printf "%s-%s-tls" (include "service.fullname" $) .name | trunc 63 | trimSuffix "-") }}
  {{- end }}
  rules:
    - host: {{ .ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "service.exposeName" (dict "root" $ "component" .name "expose" "ingress") }}
                port:
                  name: http
{{- end }}
{{- end }}
