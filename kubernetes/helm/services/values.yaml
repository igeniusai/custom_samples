replicaCount: 1

imagePullSecrets: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# List of services to deploy.
# Each entry produces one Deployment and one Service.
#
#   name          – used as the resource name suffix and container name
#   image         – container image settings
#     registry    – optional registry hostname (e.g. ghcr.io/myorg); omit for local images
#     repository  – image name
#     tag         – image tag; defaults to appVersion
#     pullPolicy  – imagePullPolicy
#   type          – Kubernetes Service type: ClusterIP | NodePort | LoadBalancer
#                   defaults to LoadBalancer
#   tls           – optional TLS configuration (secret must exist before deploying)
#     enabled     – annotates the Service with the TLS secret reference
#     secretName  – name of the pre-existing kubernetes.io/tls Secret
#                   defaults to <release>-<name>-tls
#   ports         – list of ports exposed by this service; each entry produces
#                   one named port in both the Deployment and the Service
#     port        – external port exposed by the Service
#     targetPort  – container port number the traffic is forwarded to
#     name        – port name; used as the named port reference between Service and Deployment
#     protocol    – TCP | UDP | SCTP; defaults to TCP
#
services:
  - name: example
    image:
      registry: ""
      repository: service
      tag: "latest"
      pullPolicy: IfNotPresent
    type: LoadBalancer
    tls:
      enabled: false
      secretName: ""
    ports:
      - port: 8080
        targetPort: 80
        name: http
        protocol: TCP
