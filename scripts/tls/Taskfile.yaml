version: '3'

tasks:

  default:
    silent: true
    cmds:
      - task --list

  create:
    desc: Generate a CA and a signed server certificate.
    summary: |
      Generates a local CA (ca.crt / ca.key) and a server certificate signed by
      that CA. All files are written to the certs/ directory.
      These are self-signed certificates — do not use in production.
    cmd: ./create_certs.sh {{.CLI_ARGS}}

  push:
    desc: Load a certificate pair into the cluster as a kubernetes.io/tls Secret.
    summary: |
      Deletes (if present) and recreates the TLS Secret in the target namespace.
      The --cert-name flag must match the one used in the create task.

      Overridable variables:
        context — kubectl context to use (default: docker-desktop)

      Examples:
        task push
        task push context=my-aks-cluster
        task push -- --cert-name myservice --secret-name myservice-tls --namespace staging
    vars:
      context: '{{.context | default "docker-desktop"}}'
    prompt: "kubectl context is '{{.context}}'. Are you sure you want to proceed?"
    cmd: ./cluster_tls.sh --context {{.context}} {{.CLI_ARGS}}
